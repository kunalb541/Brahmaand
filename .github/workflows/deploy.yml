name: CI / Deploy

# On every push to main: run typecheck + tests + build, then deploy to GitHub Pages.
# Pages is enabled with Source: GitHub Actions, so the live site at
# https://kunalb541.github.io/Brahmaand/ updates on every push. You can also trigger a manual
# run from the Actions tab (workflow_dispatch).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # Pages is enabled — publish the build artifact on every push to main (and manual runs).
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
