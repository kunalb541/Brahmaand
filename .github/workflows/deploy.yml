name: CI / Deploy

# On every push to main: run typecheck + tests + build (fast green CI).
# Deploy to GitHub Pages only on a manual run (workflow_dispatch) — so pushes don't fail when
# Pages is disabled (the repo is private and not published yet). To go live: enable Pages
# (Settings → Pages → Source: GitHub Actions), then run this workflow from the Actions tab.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # Pages-artifact steps run only when deploying manually (avoids red ✗ on normal pushes).
      - if: github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@v5
      - if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
