<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Brahmaand — real-sky atlas</title>
    <style>
      :root {
        color-scheme: dark;
        --panel: rgba(7, 11, 22, 0.82);
        --panel-solid: rgba(8, 13, 26, 0.96);
        --line: rgba(120, 170, 255, 0.14);
        --line-strong: rgba(120, 170, 255, 0.3);
        --text: #cfe3ff;
        --text-dim: #7f93b5;
        --text-faint: #5f7494;
        --accent: #9cc4ff;
        --btn: rgba(255, 255, 255, 0.06);
        --btn-hover: rgba(255, 255, 255, 0.12);
        --btn-active: rgba(124, 155, 255, 0.22);
        --glow: rgba(124, 155, 255, 0.55);
        --r-pill: 999px;
        --r-md: 12px;
        --r-sm: 8px;
        --t: 0.15s cubic-bezier(.4, 0, .2, 1);
        --sat: env(safe-area-inset-top, 0px);
        --sab: env(safe-area-inset-bottom, 0px);
        --sal: env(safe-area-inset-left, 0px);
        --sar: env(safe-area-inset-right, 0px);
      }
      html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
      body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; color: var(--text); }
      canvas { display: block; }
      .mono, #readout, #bottombar, #timebar, #time-display { font-family: ui-monospace, "SF Mono", Menlo, monospace; }

      /* ---- App frame: fixed regions (top bar / mid row / bottom bar). UI panels are grid/flex
             children of the frame, so they CANNOT overlap each other by construction — the only
             thing panels cover is the sky canvas behind the frame. ---- */
      #frame {
        position: fixed; inset: 0; z-index: 10;
        display: flex; flex-direction: column;
        pointer-events: none; /* sky stays interactive; bars/panels re-enable below */
      }

      /* ---- Top bar ---- */
      #topbar {
        pointer-events: auto;
        display: flex; align-items: center; gap: 8px;
        padding: calc(6px + var(--sat)) calc(10px + var(--sar)) 6px calc(10px + var(--sal));
        background: var(--panel); backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--line);
        min-height: 30px;
      }
      #brand { font-weight: 700; font-size: 13px; letter-spacing: .05em; color: var(--accent); white-space: nowrap; }
      #brand small { color: var(--text-faint); font-weight: 400; }
      #search-slot { flex: 1; display: flex; min-width: 60px; max-width: 420px; }
      #search-slot input {
        width: 100%; font: 12.5px system-ui, sans-serif; color: #eaf1ff;
        background: rgba(255, 255, 255, 0.06); border: 1px solid var(--line-strong);
        border-radius: var(--r-pill); padding: 6px 13px; outline: none; transition: border-color var(--t), background var(--t);
      }
      #search-slot input::placeholder { color: var(--text-dim); }
      #search-slot input:focus { border-color: var(--accent); background: rgba(255, 255, 255, 0.09); }
      #topbar-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; }
      #topbar button, #dock button, #rightpanel button {
        font: 600 11.5px system-ui, sans-serif; cursor: pointer; color: var(--text);
        background: var(--btn); border: 1px solid transparent;
        border-radius: var(--r-pill); padding: 5px 11px; white-space: nowrap;
        transition: background var(--t), border-color var(--t), box-shadow var(--t), transform var(--t);
      }
      #topbar button:hover, #dock button:hover, #rightpanel button:hover { background: var(--btn-hover); }
      #topbar button:active, #dock button:active, #rightpanel button:active { transform: translateY(1px); }
      #topbar button.active, #dock button.active {
        background: var(--btn-active); border-color: var(--glow); color: #eaf1ff;
        box-shadow: 0 0 14px -4px var(--glow), inset 0 0 0 1px rgba(124,155,255,.35);
      }
      #topbar button:focus-visible, #dock button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
      #dock-burger { display: none; }

      /* ---- Mid row: dock | sky | right panel ---- */
      #midrow { flex: 1; display: flex; min-height: 0; position: relative; }

      #dock {
        pointer-events: auto;
        width: 232px; flex: none; overflow-y: auto; overscroll-behavior: contain;
        background: var(--panel); backdrop-filter: blur(10px);
        border-right: 1px solid var(--line);
        padding: 4px 10px calc(10px + var(--sab)) calc(10px + var(--sal));
      }
      #dock section { border-bottom: 1px solid var(--line); padding-bottom: 8px; margin-bottom: 4px; }
      #dock section:last-child { border-bottom: none; }
      #dock h2 {
        font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-dim);
        margin: 8px 0 2px; cursor: pointer; user-select: none; display: flex; align-items: center;
      }
      #dock h2::after { content: '▾'; margin-left: auto; color: var(--text-faint); transition: transform .15s; }
      #dock section.closed h2::after { transform: rotate(-90deg); }
      #dock section.closed .sec-body { display: none; }
      #dock .row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
      #dock label { font-size: 11px; color: var(--text); }

      /* Survey switcher: a horizontal chip strip (scrolls, no wrap) with a wavelength-band dot —
         one tap = swap the telescope, the active one glows. Much cleaner than a grid of boxes. */
      #surveys {
        display: flex; gap: 6px; margin-top: 6px; overflow-x: auto; padding-bottom: 4px;
        scroll-snap-type: x proximity; scrollbar-width: thin; -webkit-overflow-scrolling: touch;
      }
      #surveys::-webkit-scrollbar { height: 5px; }
      #surveys::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 999px; }
      #surveys button {
        flex: 0 0 auto; scroll-snap-align: start; display: inline-flex; align-items: center; gap: 6px;
      }
      #surveys button .band {
        width: 7px; height: 7px; border-radius: 50%; flex: none; box-shadow: 0 0 5px currentColor;
      }

      #skyspace { flex: 1; position: relative; pointer-events: none; min-width: 0; }
      #skyspace > * { pointer-events: auto; }

      #rightpanel {
        pointer-events: auto;
        width: 304px; flex: none; display: none; overflow-y: auto; overscroll-behavior: contain;
        background: var(--panel); backdrop-filter: blur(10px);
        border-left: 1px solid var(--line);
        padding: 10px 12px calc(10px + var(--sab)) 12px;
        font: 12px ui-monospace, monospace;
      }
      #rightpanel.open { display: block; }

      /* ---- Bottom status bar: ONE flex line; sections shrink with ellipsis, never stack ---- */
      /* time machine bar — its own frame row, so it can never overlap other UI */
      #timebar {
        display: flex; gap: 6px; align-items: center; justify-content: center; flex-wrap: wrap;
        padding: 3px 10px; background: rgba(6, 12, 24, 0.78);
        border-top: 1px solid rgba(120, 170, 255, 0.12);
        font: 11px ui-monospace, "SF Mono", Menlo, monospace; color: #9cc4ff;
      }
      #timebar button {
        font: inherit; font-size: 11px; cursor: pointer; color: #dcebff;
        background: var(--btn); border: 1px solid transparent;
        border-radius: var(--r-pill); padding: 3px 10px; transition: background var(--t), border-color var(--t);
      }
      #timebar button:hover { background: var(--btn-hover); }
      #timebar button.active { background: var(--btn-active); border-color: var(--glow); }
      #time-display { min-width: 168px; text-align: center; color: #cfe3ff; cursor: pointer; }
      #timebar.warped #time-display { color: #e8c66a; } /* amber = not real time */
      #bottombar {
        pointer-events: auto;
        display: flex; align-items: center; gap: 12px;
        padding: 3px calc(10px + var(--sar)) calc(3px + var(--sab)) calc(10px + var(--sal));
        background: var(--panel); backdrop-filter: blur(10px);
        border-top: 1px solid var(--line);
        font-size: 10px; color: var(--text-dim);
        white-space: nowrap; overflow: hidden; min-height: 18px;
      }
      #bottombar > * { overflow: hidden; text-overflow: ellipsis; flex: none; }
      #readout { color: var(--text); }
      #attrib { margin-left: auto; color: #6f86ab; flex: 0 1 auto; }
      #attrib a { color: #8aa6d6; }
      #live-slot { color: #6fdf9f; }

      /* ---- Phones / narrow: dock becomes a drawer INSIDE the mid row (cannot cover the bars);
             right panel becomes a bottom sheet inside the mid row. ---- */
      @media (max-width: 760px) {
        #dock-burger { display: inline-block; }
        #dock {
          position: absolute; left: 0; top: 0; bottom: 0; z-index: 5;
          width: min(290px, 86vw);
          transform: translateX(-105%); transition: transform .18s ease-out;
          background: var(--panel-solid);
        }
        #midrow.dock-open #dock { transform: translateX(0); }
        #rightpanel {
          position: absolute; left: 0; right: 0; bottom: 0; top: auto; z-index: 6;
          width: auto; max-height: 62%;
          border-left: none; border-top: 1px solid var(--line-strong);
          border-radius: 14px 14px 0 0; background: var(--panel-solid);
        }
        #brand small { display: none; }
        #stats-slot, #hips-slot { display: none; } /* keep the status line short on phones */
      }
      @media (max-width: 420px) {
        #brand { font-size: 12px; }
        #search-slot input { font-size: 11px; padding: 5px 7px; }
      }

      /* ---- Loading splash ---- */
      #loading {
        position: fixed; inset: 0; display: grid; place-items: center; z-index: 20;
        background: #000; color: var(--accent); font-size: 13px; transition: opacity .5s; pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="loading">Loading real survey imagery…</div>
    <div id="frame">
      <header id="topbar">
        <button id="dock-burger" title="controls">☰</button>
        <div id="brand">✦ BRAHMAAND <small>· real-sky atlas</small></div>
        <div id="search-slot"></div>
        <div id="topbar-actions"></div>
      </header>
      <div id="midrow">
        <aside id="dock">
          <section id="sec-imagery-wrap">
            <h2 data-sec>Imagery</h2>
            <div class="sec-body" id="sec-imagery">
              <div class="row" id="surveys"></div>
            </div>
          </section>
          <section id="sec-overlays-wrap">
            <h2 data-sec>Overlays</h2>
            <div class="sec-body" id="sec-overlays">
              <div class="row">
                <button id="toggle-const" class="active">Constellations</button>
                <button id="toggle-stars" class="active">Star labels</button>
              </div>
              <div class="row">
                <button id="toggle-grid" title="Equatorial (ICRS/J2000) grid + celestial equator">Eq grid</button>
                <button id="toggle-ecliptic" title="Ecliptic + precession circles">Ecliptic</button>
                <button id="toggle-galactic" title="Galactic equator — the Milky Way plane">Galactic</button>
                <button id="toggle-horizon" title="Local horizon (alt/az) grid — needs your location; moves with time">Horizon</button>
              </div>
              <div class="row">
                <button id="toggle-bounds" title="Official IAU constellation boundaries">Boundaries</button>
                <button id="toggle-messier" title="Messier deep-sky objects (positions from SIMBAD); click a label to inspect">Messier</button>
              </div>
            </div>
          </section>
          <section id="sec-alerts-wrap" class="pro-only">
            <h2 data-sec>Live alerts</h2>
            <div class="sec-body" id="sec-alerts"></div>
          </section>
          <section id="sec-tools-wrap">
            <h2 data-sec>Tools</h2>
            <div class="sec-body" id="sec-tools"></div>
          </section>
        </aside>
        <div id="skyspace"></div>
        <aside id="rightpanel"></aside>
      </div>
      <div id="timebar">
        <button id="t-back1d" title="back one day">−1d</button>
        <button id="t-slower" title="slower / reverse">◀◀</button>
        <button id="t-pause" title="pause / resume">⏸</button>
        <button id="t-faster" title="faster forward">▶▶</button>
        <button id="t-fwd1d" title="forward one day">+1d</button>
        <span id="time-display" title="click to enter a date &amp; time">—</span>
        <span id="time-rate"></span>
        <button id="t-now" title="return to real time">● Now</button>
      </div>
      <footer id="bottombar">
        <span id="readout">RA --h --m&nbsp;&nbsp;Dec ±--° --′</span>
        <span id="stats-slot"></span>
        <span id="hips-slot"></span>
        <span id="live-slot"></span>
        <span id="attrib"></span>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
